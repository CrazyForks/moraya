name: Sync Renderer Plugin Versions

on:
  schedule:
    # Run weekly on Mondays at 08:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no commit/PR)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync renderer plugin versions from npm
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run sync script
        run: node scripts/sync-renderer-plugins.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet src/lib/services/plugin/renderer-versions.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git diff src/lib/services/plugin/renderer-versions.json
          fi

      - name: Create Pull Request
        if: steps.diff.outputs.changed == 'true' && inputs.dry_run != true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync renderer plugin versions'
          title: 'chore: sync renderer plugin versions'
          body: |
            Auto-generated by the `sync-renderer-plugins` workflow.

            Updates `src/lib/services/plugin/renderer-versions.json` with the latest stable versions
            of all 10 built-in renderer plugins from the npm registry.

            Please review the version bumps and merge if all changelogs look compatible.
          branch: chore/sync-renderer-plugins
          delete-branch: true
          labels: dependencies
