name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    # Explicit runner pin — `ubuntu-latest` resolves to 24.04 at time of
    # writing, but the alias moves. Pinning avoids surprise runner rollouts
    # affecting reproducibility (see also the build job below which stays on
    # 22.04 for libwebkit2gtk-4.1 LTS compatibility during Tauri bundling).
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm check

      # v0.96.0 §6 — i18n key coverage. Fail PRs that introduce `t('foo.bar')`
      # callsites without a corresponding key in @moraya/core's en.json.
      - name: i18n key coverage
        run: node scripts/i18n-coverage.mjs src

      # v0.60.0-pre §1.3.3: enforce npm-only consumption boundary for
      # @moraya/core. The sibling repo at ../moraya-core (or
      # ./moraya-core symlink) is for cross-repo editing convenience
      # only; production code MUST import via the published package name.
      #
      # Vendored tarballs under ./vendor/*.tgz (frozen artifacts produced by
      # `pnpm pack` in the sibling repo) are acceptable as a pre-publication
      # bridge per §1.3 "Local iteration without a publish round-trip".
      - name: Forbid sibling-path imports of @moraya/core
        run: |
          set -e
          if grep -rEn "from[[:space:]]+['\"](\.{1,2}/)+moraya-core" src src-tauri 2>/dev/null; then
            echo "::error::Found relative-path import of moraya-core. Use the published package: import from '@moraya/core'."
            exit 1
          fi
          if grep -nE "['\"](\.{1,2}/)+moraya-core" tsconfig.json 2>/dev/null; then
            echo "::error::tsconfig.json must not map @moraya/core to a sibling path."
            exit 1
          fi
          if [ -f pnpm-workspace.yaml ] && grep -nE "moraya-core" pnpm-workspace.yaml; then
            echo "::error::pnpm-workspace.yaml must not reference moraya-core."
            exit 1
          fi
          # Allow registry semver (^0.5.0) OR a frozen tarball under ./vendor/*.tgz
          # (the pre-publication bridge, per §1.3). Forbid link:/workspace: and any
          # other file: path (e.g. a sibling repo like file:../moraya-core).
          core_spec=$(grep -oE '"@moraya/core":[[:space:]]*"[^"]+"' package.json | grep -oE '"[^"]+"$' | tr -d '"')
          case "$core_spec" in
            file:./vendor/*.tgz|file:vendor/*.tgz)
              : ;; # allowed: frozen vendored tarball bridge
            file:*|link:*|workspace:*)
              echo "::error::package.json must depend on @moraya/core via the registry or a frozen tarball under ./vendor/*.tgz, not '$core_spec'."
              exit 1 ;;
            *)
              : ;; # allowed: registry semver
          esac
          echo "OK: @moraya/core dependency form is allowed ($core_spec)."

  build:
    # Kept on 22.04 (not bumped to 24.04) for tauri-app bundling: 22.04 is the
    # oldest LTS still under Ubuntu Pro, giving the deb/AppImage bundles the
    # widest glibc + libwebkit2gtk-4.1 compatibility target. Bump to 24.04 only
    # after confirming Homebrew Cask + Linux distributor consumers accept it.
    runs-on: ubuntu-22.04
    needs: check

    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        # v3 (2025) runs on Node 24 shim; cache key structure unchanged from v2.
        uses: swatinem/rust-cache@v3
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tauri build

      # Keep optional diagnostics helpers compilable and tested so they do not
      # rot between releases.
      - name: Check diagnostics feature
        working-directory: src-tauri
        run: cargo check --features diagnostics

      - name: Test diagnostics feature
        working-directory: src-tauri
        run: cargo test --features diagnostics
